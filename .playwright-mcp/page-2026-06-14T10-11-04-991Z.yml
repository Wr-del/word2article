        - generic [ref=e75]: The heavy rain had not stopped for three days. The small village at the foot of the mountain was in danger. The local government ordered everyone to abandon their homes immediately. Li Wei, a young teacher, helped his elderly neighbors move to higher ground. He knew that the ability to stay calm in a crisis was very important. As he carried an old woman on his back, he thought about his own family. His wife and daughter had already left. He hoped they were safe. After hours of hard work, all the villagers were finally in a safe place. Li Wei felt tired but relieved. He had helped others achieve safety. That night, as the rain continued to fall, he sat with the villagers in a temporary shelter. They shared food and stories. An old man said, "You have a kind heart. You helped us when we needed it most." Li Wei smiled. He knew that true happiness came from helping others. The next morning, the sun came out. The water began to go down. The villagers started to rebuild their lives. Li Wei knew that they would never abandon each other again. Their shared experience had made them stronger. He looked at the clear sky and felt hope for the future.
