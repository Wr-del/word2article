          - paragraph [ref=e78]: 大雨已经连续下了三天。山脚下的小村庄岌岌可危。当地政府下令所有人立即撤离家园。青年教师李伟搀扶着年迈的邻居们转移到高地。他深知在危机中保持冷静至关重要。背着老妇人的时候，他想起自己的家人——妻子和女儿已经先行撤离，他祈愿她们平安无事。经过数小时的奋战，所有村民终于抵达安全地带。李伟虽感疲惫，却如释重负——他帮助他人脱离了险境。那夜，雨势未歇，他与村民们在临时避难所里围坐，分享食物与故事。一位老人感慨道："你有一颗善良的心。在我们最需要帮助的时候伸出了援手。"李伟微笑着，他明白真正的幸福源于助人。翌日清晨，云开日出，水位渐退。村民们开始重建家园。李伟知道，经历过这场患难，他们再也不会彼此抛弃。共同的经历让大家更加团结。他仰望晴空，对未来充满希望。
